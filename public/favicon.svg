<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#060606"/>

  <!-- Horizontal rule — top of S -->
  <rect x="9" y="7" width="14" height="2.5" rx="1.25" fill="#c8ff00"/>

  <!-- Horizontal rule — middle of S -->
  <rect x="9" y="14.75" width="14" height="2.5" rx="1.25" fill="#c8ff00"/>

  <!-- Horizontal rule — bottom of S -->
  <rect x="9" y="22.5" width="14" height="2.5" rx="1.25" fill="#c8ff00"/>

  <!-- Left vertical — top half of S -->
  <rect x="9" y="7" width="2.5" height="7.75" rx="1.25" fill="#c8ff00"/>

  <!-- Right vertical — bottom half of S -->
  <rect x="20.5" y="15.25" width="2.5" height="9.75" rx="1.25" fill="#c8ff00"/>

  <!-- Lime dot (the SNIP. period) -->
  <circle cx="27.5" cy="27" r="2" fill="#c8ff00"/>
</svg>
